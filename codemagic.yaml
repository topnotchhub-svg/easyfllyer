workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key2"
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      ruby: default
      vars:
        BUNDLE_ID: "com.easyflyer.deals"
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Build and export IPA
        script: |
          cd ios
          
          # Build archive
          xcodebuild archive \
            -workspace "EasyFlyer.xcworkspace" \
            -scheme "EasyFlyer" \
            -archivePath "EasyFlyer.xcarchive" \
            -allowProvisioningUpdates \
            -destination 'generic/platform=iOS'
          
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "EasyFlyer.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "." \
            -allowProvisioningUpdates
          
          # Clean up
          rm -rf "EasyFlyer.xcarchive"
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true