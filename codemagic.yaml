workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key2"
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      ruby: default
      vars:
        BUNDLE_ID: "com.easyflyer.deals"
        TEAM_ID: "QJW53673RX"  # <--- REPLACE WITH YOUR ACTUAL TEAM ID
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Fetch signing files
        script: |
          cd ios
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --platform IOS \
            --team-id "$TEAM_ID"
      
      - name: Set up keychain
        script: |
          keychain initialize
          keychain add-certificates
      
      - name: Build archive
        script: |
          cd ios
          xcodebuild archive \
            -workspace "EasyFlyer.xcworkspace" \
            -scheme "EasyFlyer" \
            -archivePath "EasyFlyer.xcarchive" \
            -allowProvisioningUpdates \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER=""
      
      - name: Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath "EasyFlyer.xcarchive" \
            -exportOptionsPlist "ExportOptions.plist" \
            -exportPath "." \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$TEAM_ID"
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true