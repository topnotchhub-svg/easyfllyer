workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key1"  # Must match the name from Step 2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/jspromotionalatestversion.xcworkspace"
        XCODE_SCHEME: "jspromotionalatestversion"  # Your scheme name
        BUNDLE_ID: "com.easyflyer.deals"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Build IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration  # This uses the integration from Step 2
        submit_to_testflight: true  # Automatically submit to TestFlight [citation:5]