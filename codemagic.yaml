workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
      vars:
        BUNDLE_ID: "com.easyflyer.deals"
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install dependencies
        script: |
          bundle install
          npm install
          cd ios
          bundle exec pod install --repo-update
          cd ..
      
      - name: Create export options
        script: |
          cd ios
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
      
      - name: Build archive
        script: |
          cd ios
          xcodebuild archive \
            -workspace "EasyFlyer.xcworkspace" \
            -scheme "EasyFlyer" \
            -archivePath "EasyFlyer.xcarchive" \
            -allowProvisioningUpdates
      
      - name: Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath "EasyFlyer.xcarchive" \
            -exportOptionsPlist "exportOptions.plist" \
            -exportPath "." \
            -allowProvisioningUpdates
      
      - name: Clean up
        script: |
          cd ios
          rm -rf "EasyFlyer.xcarchive"
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true