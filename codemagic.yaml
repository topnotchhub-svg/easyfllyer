workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key1"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install dependencies
        script: |
          bundle install
          npm install
          cd ios
          bundle exec pod install --repo-update
          cd ..
      
      - name: Create export options
        script: |
          cd ios
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
      
      - name: Auto-detect scheme and build
        script: |
          cd ios
          
          # List available schemes
          echo "Available schemes:"
          xcodebuild -list -project "jspromotionalatestversion.xcodeproj"
          
          # Build with the correct scheme (should be easy-flyer)
          xcode-project build-ipa \
            --project "jspromotionalatestversion.xcodeproj" \
            --scheme "easy-flyer" \
            --export-options-plist "exportOptions.plist"
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true