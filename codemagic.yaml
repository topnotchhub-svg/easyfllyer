workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key2"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
      vars:
        BUNDLE_ID: "com.easyflyer.deals"
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install Ruby gems
        script: |
          gem install bundler
          bundle install || true
      
      - name: Install npm dependencies
        script: |
          npm ci || npm install
      
      - name: Clean and install CocoaPods
        script: |
          cd ios
          # Clean previous pods
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf *.xcworkspace
          
          # Reinstall pods
          bundle exec pod install --repo-update --verbose
          cd ..
      
      - name: Verify workspace exists
        script: |
          cd ios
          if [ -d "EasyFlyer.xcworkspace" ]; then
            echo "✅ Workspace found"
          else
            echo "❌ Workspace not found! Pod install may have failed."
            exit 1
          fi
          cd ..
      
      - name: Build and export IPA
        script: |
          cd ios
          
          # Build with automatic signing
          xcodebuild archive \
            -workspace "EasyFlyer.xcworkspace" \
            -scheme "EasyFlyer" \
            -archivePath "EasyFlyer.xcarchive" \
            -allowProvisioningUpdates \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          # Create export options
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "EasyFlyer.xcarchive" \
            -exportOptionsPlist "exportOptions.plist" \
            -exportPath "." \
            -allowProvisioningUpdates
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true