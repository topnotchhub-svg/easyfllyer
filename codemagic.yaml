workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "codem keys"
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios
          pod install --repo-update
          cd ..
      - name: Build and export
        script: |
          cd ios
          xcodebuild archive \
            -workspace EasyFlyer.xcworkspace \
            -scheme EasyFlyer \
            -archivePath EasyFlyer.xcarchive \
            -allowProvisioningUpdates \
            -destination 'generic/platform=iOS'
          xcodebuild -exportArchive \
            -archivePath EasyFlyer.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath . \
            -allowProvisioningUpdates
          rm -rf EasyFlyer.xcarchive
    artifacts:
      - ios/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true