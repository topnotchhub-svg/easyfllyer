workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key1"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install Ruby gems
        script: |
          bundle install
      
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Install CocoaPods
        script: |
          cd ios
          bundle exec pod install --repo-update
          cd ..
      
      - name: Build IPA for TestFlight
        script: |
          # Build directly from repository root (no cd ios)
          xcode-project build-ipa \
            --project "ios/jspromotionalatestversion.xcodeproj" \
            --scheme "jspromotionalatestversion"
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true