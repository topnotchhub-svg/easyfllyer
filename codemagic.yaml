workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key1"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
      vars:
        XCODE_WORKSPACE: "ios/jspromotionalatestversion.xcworkspace"
        XCODE_SCHEME: "jspromotionalatestversion"
        BUNDLE_ID: "com.easyflyer.deals"
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install Ruby gems
        script: |
          bundle install
      - name: Install npm dependencies
        script: |
          npm install
      - name: Install CocoaPods
        script: |
          cd ios
          bundle exec pod install --repo-update
          cd ..
      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
          cd ios
          agvtool new-version -all $BUILD_NUMBER
          cd ..
      - name: Build IPA
        script: |
          cd ios
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true