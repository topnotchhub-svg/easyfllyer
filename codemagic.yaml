workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key1"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
      vars:
        BUNDLE_ID: "com.easyflyer.deals"
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install dependencies
        script: |
          bundle install
          npm install
          cd ios
          bundle exec pod install --repo-update
          cd ..
      
      - name: Install Fastlane
        script: |
          gem install fastlane -NV
      
      - name: Create Fastfile
        script: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Fastfile << 'EOF'
          default_platform(:ios)
          
          platform :ios do
            desc "Build and upload to TestFlight"
            lane :testflight do
              build_app(
                workspace: "EasyFlyer.xcworkspace",
                scheme: "EasyFlyer",
                export_method: "app-store",
                skip_build_archive: false,
                skip_archive: false,
                clean: true
              )
              
              upload_to_testflight(
                skip_waiting_for_build_processing: true
              )
            end
          end
          EOF
      
      - name: Build and upload with Fastlane
        script: |
          cd ios
          bundle exec fastlane testflight --verbose
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true