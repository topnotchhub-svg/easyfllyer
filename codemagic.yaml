workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key2"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
      vars:
        BUNDLE_ID: "com.easyflyer.deals"
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install dependencies
        script: |
          bundle install
          npm install
          cd ios
          bundle exec pod install --repo-update
          cd ..
      
      - name: Build and deploy to TestFlight
        script: |
          cd ios
          xcode-project build-ipa \
            --workspace "EasyFlyer.xcworkspace" \
            --scheme "EasyFlyer" \
            --export-method app-store
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true