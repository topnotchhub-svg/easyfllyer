workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "codem keys"
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          cd ios && pod install && cd ..
      
      - name: Build IPA
        script: |
          cd ios
          xcode-project build-ipa \
            --workspace "EasyFlyer.xcworkspace" \
            --scheme "EasyFlyer" \
            --export-method app-store
    
    artifacts:
      - build/ios/ipa/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true