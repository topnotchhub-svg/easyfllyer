workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key1"
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ruby: default
    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/Pods
        - vendor/bundle
    scripts:
      - name: Install Ruby gems
        script: |
          bundle install
      
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Install CocoaPods
        script: |
          cd ios
          bundle exec pod install --repo-update
          cd ..
      
      - name: Create export options
        script: |
          cat > export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      
      - name: Build IPA
        script: |
          cd ios
          xcodebuild archive \
            -project "jspromotionalatestversion.xcodeproj" \
            -scheme "jspromotionalatestversion" \
            -archivePath "jspromotionalatestversion.xcarchive"
          
          xcodebuild -exportArchive \
            -archivePath "jspromotionalatestversion.xcarchive" \
            -exportPath "." \
            -exportOptionsPlist "../export_options.plist"
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true