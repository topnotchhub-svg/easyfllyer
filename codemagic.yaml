workflows:
  ios-testflight:
    name: Build and deploy to TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: "Codemagic Key2"
    environment:
      node: 20
      xcode: 16.2
      cocoapods: default
      ruby: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          
          cd ios
          # Force reinstallation of pods
          sudo gem install cocoapods
          pod deintegrate || true
          pod cache clean --all
          pod install --repo-update
          cd ..
      
      - name: Build with xcodebuild directly (bypassing workspace issues)
        script: |
          cd ios
          
          # Use xcodebuild directly with the project
          xcodebuild clean build archive \
            -project "EasyFlyer.xcodeproj" \
            -scheme "EasyFlyer" \
            -archivePath "EasyFlyer.xcarchive" \
            -allowProvisioningUpdates \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          
          # Create export options
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "EasyFlyer.xcarchive" \
            -exportOptionsPlist "exportOptions.plist" \
            -exportPath "." \
            -allowProvisioningUpdates
    
    artifacts:
      - ios/*.ipa
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true